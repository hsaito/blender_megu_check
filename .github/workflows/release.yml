name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare archive
        run: |
          mkdir -p staging/blender_megu_check
          git archive HEAD | tar -x -C staging/blender_megu_check
          cd staging
          zip -r ../blender_megu_check.zip blender_megu_check

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: blender_megu_check.zip
          generate_release_notes: true
